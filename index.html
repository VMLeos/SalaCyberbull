<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css"
rel="stylesheet"
integrity="sha384-+0n0xVW2eSR5OomGNYDnhzAbDsOXxcvSN1TPprVMTNDbiYZCxYbOOl7+AMvyTG2x"
crossorigin="anonymous">

<link rel="stylesheet" href="assets/css/estilos.css">

<title>Cyberbull</title>

<style>

body{
background-image: url("assets/images/Cyberbull cyborg.jpeg");
background-size: cover;
background-position: center;
background-repeat: no-repeat;
min-height:100vh;
display:flex;
flex-direction:column;
}

header{
text-align:center;
color:white;
padding:20px;
font-size:2rem;
font-weight:bold;
text-shadow:2px 2px 8px black;
}

#video-container{
display:flex;
justify-content:center;
align-items:center;
width:100%;
flex-grow:1;
}

#video-container video{
width:90%;
max-width:800px;
height:auto;
}

footer{
text-align:center;
color:white;
padding:15px;
font-size:0.9rem;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(4px);
}

</style>

</head>

<body>

<header>
Cyberbull Intelligence System
</header>

<div id="video-container">

<video id="my-video" autoplay muted loop playsinline>
<source src="assets/images/Cyberbull fire.mp4" type="video/mp4">
Tu navegador no soporta video HTML5.
</video>

</div>

<div class="cont">
<div class="margin">

<center>
<a href="home.html" id="boton-enlace" class="btnir">Entrar a la sala</a>
</center>

</div>
</div>

<footer>
© 2026 Cyberbull Intelligence System
</footer>

<script>

var video = document.getElementById("my-video");
var botonEnlace = document.getElementById("boton-enlace");

video.addEventListener("ended", function() {
video.style.display = "none";
botonEnlace.classList.add("show");
});

video.addEventListener("canplaythrough", function() {
video.play();
});

</script>

</body>
</html>
